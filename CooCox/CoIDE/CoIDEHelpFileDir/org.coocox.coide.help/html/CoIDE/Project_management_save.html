                    <td width="76%" valign="top" style="padding-left:0.5em; padding-top:0.5em;">
					  <!-- InstanceBeginEditable name="pagecenter" -->
					  <h2 class="fontsize140"><span >Saving project to another location </span></h2>
                      <!-- Saving project div ---------------------------------------------------------------------------------------->
                      <div>
                        <p style="margin-top:10px;">To save a project to another location using CoIDE, you need to perform the following steps:</p>
                        <table width="100%" border="0" align="center" cellpadding="0" cellspacing="0">
                          <tr>
                            <td align="center"><img src="../images/builder/ProjectMrg_3_save_1.jpg" name="picSave" id="picSave" /></td>
                          </tr>
                          <tr>
                            <td align="center">&nbsp;</td>
                          </tr>
                          <tr>
                            <td><ol class="blue6" id="step" style="LINE-HEIGHT: 25px; list-style:none;">
                              <li id="step1">1. Select<strong> Project &gt; Save Project As...</strong>. </li>
                              <li  id="step2" style=" display:none;" >2. Choose the <strong>location</strong> you want to save. </li>
                            </ol></td>
                          </tr>
                          <tr>
                            <td align="center"><input type="button" id="saveNext" class="input" onclick="lastSavePic()" value=" &lt;&lt;  Previous " />
                              &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                              <input type="button" id="saveLast" class="input"  value=" Next  &gt;&gt; " onclick="nextSavePic()" /></td>
                          </tr>
                        </table>
                        <script language="JavaScript" type="text/javascript">
var c=1;
function nextSavePic()
{
	c=c+1;	
	if(c>=3)
    {	
		alert('This is last photo.');
	    c=2;
	}
	var picSave=document.getElementById("picSave").src="../images/builder/ProjectMrg_3_save_"+c+".jpg";	
	var k=c-1;
document.getElementById("step"+k).style.display="None";
document.getElementById("step"+c).style.display="block";
}
function lastSavePic()
{
	c=c-1;	
	if(c<=0)
	{	
		alert('This is first photo.');
		c=1;
	}
	var picSave=document.getElementById("picSave").src="../images/builder/ProjectMrg_3_save_"+c+".jpg";	
	
var k=c+1;
document.getElementById("step"+k).style.display="None";
document.getElementById("step"+c).style.display="block";

}
                      
</script>
